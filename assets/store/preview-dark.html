<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1280px; height: 800px; overflow: hidden; }
      body {
        display: flex;
        align-items: center;
        gap: 64px;
        padding: 0 90px;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system,
          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(1200px 700px at 12% 0%, #18181c 0%, #0e0e11 55%, #09090b 100%);
        color: #e4e4e7;
      }
      .copy { width: 520px; flex: 0 0 auto; }
      .logo {
        display: inline-flex; align-items: center; gap: 18px; margin-bottom: 30px;
      }
      .logo .mark {
        width: 80px; height: 80px; border-radius: 20px; display: block;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .logo .name { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; color: #fafafa; }
      h1 {
        font-size: 58px; line-height: 1.05; font-weight: 800;
        letter-spacing: -0.03em; margin-bottom: 22px; color: #fafafa;
      }
      h1 .accent { color: #71717a; }
      p.lead { font-size: 23px; line-height: 1.5; color: #a1a1aa; margin-bottom: 34px; }
      ul { list-style: none; display: flex; flex-direction: column; gap: 14px; }
      li { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 500; }
      li .tick {
        width: 26px; height: 26px; border-radius: 999px; background: #fafafa; color: #18181b;
        display: grid; place-items: center; flex: 0 0 auto;
      }

      .device { flex: 0 0 auto; position: relative; }
      .device .bar {
        width: 420px; height: 40px; background: #27272a;
        border: 1px solid #3f3f46; border-bottom: none;
        border-radius: 16px 16px 0 0; display: flex; align-items: center;
        gap: 8px; padding: 0 16px;
      }
      .device .dot { width: 11px; height: 11px; border-radius: 999px; }
      .device iframe {
        width: 420px; height: 566px; border: 1px solid #3f3f46; border-top: none;
        border-radius: 0 0 16px 16px; background: #09090b; display: block;
      }
      .device .shadow {
        position: absolute; inset: 0; border-radius: 16px;
        box-shadow: 0 40px 90px -20px rgba(0, 0, 0, 0.7); z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="copy">
      <div class="logo">
        <img class="mark" src="../../icons/icon128.png" alt="HeaderForge icon" />
        <span class="name">HeaderForge</span>
      </div>
      <h1>Looks great <span class="accent">in the dark too.</span></h1>
      <p class="lead">HeaderForge follows your system theme automatically, so the popup matches whatever Chrome is using.</p>
      <ul>
        <li><span class="tick"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Automatic light and dark themes</li>
        <li><span class="tick"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Per-site profiles &amp; URL filters</li>
        <li><span class="tick"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Open source · no tracking</li>
      </ul>
    </div>

    <div class="device">
      <div class="shadow"></div>
      <div class="bar">
        <span class="dot" style="background:#ec6a5e"></span>
        <span class="dot" style="background:#f4bf4f"></span>
        <span class="dot" style="background:#61c454"></span>
      </div>
      <iframe src="preview-popup.html" scrolling="no"></iframe>
    </div>
  </body>
</html>
