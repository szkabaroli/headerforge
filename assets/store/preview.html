<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1280px; height: 800px; overflow: hidden; }
      body {
        display: flex;
        align-items: center;
        gap: 64px;
        padding: 0 90px;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system,
          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(1200px 700px at 12% 0%, #f4f4f5 0%, #e8e8ec 55%, #dedee3 100%);
        color: #18181b;
      }
      .copy { width: 520px; flex: 0 0 auto; }
      .logo {
        display: inline-flex; align-items: center; gap: 14px; margin-bottom: 30px;
      }
      .logo .mark {
        width: 60px; height: 60px; border-radius: 15px; background: #18181b;
        display: grid; place-items: center;
      }
      .logo .name { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
      h1 {
        font-size: 58px; line-height: 1.05; font-weight: 800;
        letter-spacing: -0.03em; margin-bottom: 22px;
      }
      h1 .accent { color: #52525b; }
      p.lead { font-size: 23px; line-height: 1.5; color: #52525b; margin-bottom: 34px; }
      ul { list-style: none; display: flex; flex-direction: column; gap: 14px; }
      li { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 500; }
      li .tick {
        width: 26px; height: 26px; border-radius: 999px; background: #18181b; color: #fff;
        display: grid; place-items: center; flex: 0 0 auto;
      }

      .device { flex: 0 0 auto; position: relative; }
      .device .bar {
        width: 420px; height: 40px; background: #f4f4f5;
        border: 1px solid #d4d4d8; border-bottom: none;
        border-radius: 16px 16px 0 0; display: flex; align-items: center;
        gap: 8px; padding: 0 16px;
      }
      .device .dot { width: 11px; height: 11px; border-radius: 999px; }
      .device iframe {
        width: 420px; height: 566px; border: 1px solid #d4d4d8; border-top: none;
        border-radius: 0 0 16px 16px; background: #fff; display: block;
      }
      .device .shadow {
        position: absolute; inset: 0; border-radius: 16px;
        box-shadow: 0 40px 80px -20px rgba(24,24,27,0.45); z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="copy">
      <div class="logo">
        <span class="mark">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fafafa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16"/><path d="M20 4v16"/><path d="M4 12h16"/></svg>
        </span>
        <span class="name">HeaderForge</span>
      </div>
      <h1>Modify HTTP headers <span class="accent">on any site.</span></h1>
      <p class="lead">Set, edit, or remove request &amp; response headers. Organize them into profiles scoped to the sites you choose.</p>
      <ul>
        <li><span class="tick"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Per-site profiles &amp; URL filters</li>
        <li><span class="tick"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Open source · no tracking · no remote code</li>
        <li><span class="tick"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Manifest V3 · can't read your traffic</li>
      </ul>
    </div>

    <div class="device">
      <div class="shadow"></div>
      <div class="bar">
        <span class="dot" style="background:#ec6a5e"></span>
        <span class="dot" style="background:#f4bf4f"></span>
        <span class="dot" style="background:#61c454"></span>
      </div>
      <iframe src="preview-popup.html" scrolling="no"></iframe>
    </div>
  </body>
</html>
